services:
  - type: web
    name: ssc-ai-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEYS
        sync: false          # set this manually in the Render dashboard — never commit real keys
      - key: GEMINI_MODELS
        value: gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.0-flash,gemini-1.5-flash
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: NODE_VERSION
        value: "20"
