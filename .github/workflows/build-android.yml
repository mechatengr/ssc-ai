name: Build SSC AI Android APK

# Runs entirely on GitHub's free cloud runners. Trigger it by pushing to
# "main", or manually from the Actions tab ("Run workflow"). The finished
# APK is attached to a GitHub Release you can open on your phone and
# download directly — no computer, terminal, or paid service required.

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install project dependencies
        run: npm install

      - name: Add Android platform (first run only)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Apply SSC crest as the app icon
        run: |
          for pair in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${pair%%:*}"; size="${pair##*:}";
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert frontend/assets/logo.png -resize ${size}x${size} "$dir/ic_launcher.png"
            convert frontend/assets/logo.png -resize ${size}x${size} \( +clone -alpha extract -fill black -colorize 100 -fill white -draw "circle $((size/2)),$((size/2)) $((size/2)),0" \) -alpha off -compose CopyOpacity -composite "$dir/ic_launcher_round.png"
          done

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          cp "$APK_PATH" SSC-AI.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSC-AI-apk
          path: SSC-AI.apk

      - name: Publish APK to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: SSC AI — Android build ${{ github.run_number }}
          body: |
            Automatic Android build of SSC AI.
            Download **SSC-AI.apk** below, open it on your Android phone, and
            tap Install (you may need to allow "install from unknown sources"
            the first time — see the setup guide for exact steps).
          files: SSC-AI.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
