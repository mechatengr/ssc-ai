<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>SSC AI — Synergy Science Circle</title>
<meta name="description" content="SSC AI — United by Logic, Driven by Science. The official AI assistant of Synergy Science Circle.">
<meta name="theme-color" content="#0a1622">
<link rel="icon" href="assets/logo.png">
<link rel="apple-touch-icon" href="assets/logo.png">
<link rel="manifest" href="manifest.json">

<!-- Fonts: Orbitron (display/brand), Exo 2 (body), Share Tech Mono (mono/data) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- Markdown / code / math rendering -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">

<style>
/* ==========================================================================
   SSC AI — Design tokens
   Palette drawn directly from the SSC crest: deep navy field, twin steel /
   silver outer rings, warm gold radiant atom at the centre.
   ========================================================================== */
:root{
  --gold:        #d9b34d;
  --gold-bright: #f6d774;
  --gold-dim:    #8a6f2a;
  --navy-deep:   #060d16;
  --navy:        #0c1a2b;
  --navy-mid:    #12253c;
  --navy-panel:  #0f2038;
  --steel:       #b9c2cf;
  --steel-dim:   #6b7686;
  --ink:         #e9edf3;
  --ink-dim:     #9aa7b8;
  --danger:      #e0555f;
  --success:     #4fbf8b;
  --radius:      14px;
  --radius-sm:   9px;
  --font-brand:  'Orbitron', sans-serif;
  --font-body:   'Exo 2', sans-serif;
  --font-mono:   'Share Tech Mono', monospace;
  --shadow-glow: 0 0 24px rgba(217,179,77,.18);
  --bg: var(--navy-deep);
  --panel: var(--navy);
  --panel-2: var(--navy-mid);
  --border: rgba(185,194,207,.14);
  --text: var(--ink);
  --text-dim: var(--ink-dim);
  --bubble-user: linear-gradient(135deg,#1a3050,#122238);
  --bubble-ai: rgba(255,255,255,.03);
}
html[data-theme="light"]{
  --bg: #f2efe6;
  --panel: #fbfaf5;
  --panel-2: #eeeadd;
  --border: rgba(20,35,55,.12);
  --text: #142338;
  --text-dim: #55637a;
  --ink: #142338;
  --bubble-user: linear-gradient(135deg,#dce8f7,#e9f1fb);
  --bubble-ai: rgba(20,35,55,.035);
  --shadow-glow: 0 0 24px rgba(217,179,77,.12);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body);
  overflow:hidden; transition:background .35s ease,color .35s ease;
}
::selection{ background:var(--gold-dim); color:#fff; }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:var(--border); border-radius:8px; }
a{ color: var(--gold); }

button{ font-family:inherit; }

/* ---------- Particle canvas ---------- */
#particles{ position:fixed; inset:0; z-index:0; opacity:.55; pointer-events:none; }

/* ---------- App shell ---------- */
#app{ position:relative; z-index:1; display:flex; height:100%; width:100%; }

/* ---------- Sidebar ---------- */
#sidebar{
  width:290px; min-width:290px; background:var(--panel); border-right:1px solid var(--border);
  display:flex; flex-direction:column; transition:transform .3s ease, width .3s ease;
}
.brand{
  display:flex; align-items:center; gap:10px; padding:16px 16px 12px;
}
.brand img{ width:38px; height:38px; filter:drop-shadow(0 0 8px rgba(217,179,77,.35)); }
.brand-text{ display:flex; flex-direction:column; line-height:1.1; }
.brand-text b{ font-family:var(--font-brand); font-size:14px; letter-spacing:.06em; color:var(--gold); }
.brand-text span{ font-size:10px; color:var(--text-dim); letter-spacing:.08em; font-family:var(--font-mono); }

.new-chat-btn{
  margin:6px 14px 12px; padding:10px 14px; border-radius:var(--radius-sm); border:1px solid var(--gold-dim);
  background:linear-gradient(135deg, rgba(217,179,77,.16), rgba(217,179,77,.04)); color:var(--gold-bright);
  font-weight:600; font-size:13.5px; cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:.2s;
}
.new-chat-btn:hover{ background:rgba(217,179,77,.24); box-shadow:var(--shadow-glow); }

.sidebar-search{ margin:0 14px 10px; position:relative; }
.sidebar-search input{
  width:100%; padding:8px 10px 8px 30px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--panel-2); color:var(--text); font-size:12.5px; font-family:var(--font-body);
}
.sidebar-search svg{ position:absolute; left:9px; top:9px; width:14px; height:14px; opacity:.5; }

#session-list{ flex:1; overflow-y:auto; padding:4px 8px 8px; }
.session-item{
  display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:10px; cursor:pointer;
  font-size:12.8px; color:var(--text-dim); margin-bottom:2px; position:relative; user-select:none;
}
.session-item:hover{ background:var(--panel-2); color:var(--text); }
.session-item.active{ background:rgba(217,179,77,.12); color:var(--gold-bright); }
.session-item .stitle{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.session-item .pin-ico{ opacity:.55; width:12px; height:12px; flex-shrink:0; }
.session-item.pinned .pin-ico{ opacity:1; color:var(--gold); }
.sidebar-foot{ padding:10px 14px; border-top:1px solid var(--border); display:flex; gap:8px; }
.icon-btn{
  width:34px; height:34px; border-radius:10px; border:1px solid var(--border); background:var(--panel-2);
  color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s;
}
.icon-btn:hover{ color:var(--gold-bright); border-color:var(--gold-dim); }
.icon-btn.active{ color:var(--gold-bright); border-color:var(--gold); background:rgba(217,179,77,.12); }

/* ---------- Main column ---------- */
#main{ flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }

#topbar{
  display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border);
  background:color-mix(in srgb, var(--panel) 70%, transparent); backdrop-filter:blur(10px);
}
#menu-toggle{ display:none; }
.topbar-title{ font-family:var(--font-brand); font-size:13px; letter-spacing:.05em; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.status-dot{ width:8px; height:8px; border-radius:50%; background:var(--success); box-shadow:0 0 8px var(--success); }
.status-dot.off{ background:var(--danger); box-shadow:0 0 8px var(--danger); }
.status-dot.pending{ background:#e0b04f; box-shadow:0 0 8px #e0b04f; }

.topbar-controls{ display:flex; align-items:center; gap:8px; }

/* dropdown trigger pill */
.dd-trigger{
  display:flex; align-items:center; gap:6px; padding:7px 11px; border-radius:999px; border:1px solid var(--border);
  background:var(--panel-2); color:var(--text-dim); font-size:12px; cursor:pointer; white-space:nowrap; transition:.2s;
}
.dd-trigger:hover{ border-color:var(--gold-dim); color:var(--text); }
.dd-trigger svg.chev{ width:11px; height:11px; opacity:.6; }

.toggle-chip{
  display:flex; align-items:center; gap:6px; padding:7px 10px; border-radius:999px; border:1px solid var(--border);
  background:var(--panel-2); color:var(--text-dim); font-size:11.5px; cursor:pointer; transition:.2s;
}
.toggle-chip.on{ color:var(--gold-bright); border-color:var(--gold); background:rgba(217,179,77,.14); box-shadow:var(--shadow-glow); }

/* ---------- Chat area ---------- */
#chat-scroll{ flex:1; overflow-y:auto; padding:18px 0 8px; position:relative; }
#chat-inner{ max-width:820px; margin:0 auto; padding:0 18px; display:flex; flex-direction:column; gap:18px; }

.welcome{ text-align:center; padding:60px 20px 20px; }
.welcome .atom-mark{ width:88px; height:88px; margin:0 auto 14px; }
.welcome h1{ font-family:var(--font-brand); font-size:22px; letter-spacing:.04em; color:var(--gold-bright); margin:0 0 6px;}
.welcome p{ color:var(--text-dim); font-size:13.5px; max-width:440px; margin:0 auto; }
.suggest-row{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:20px; }
.suggest-chip{
  padding:9px 14px; border-radius:12px; border:1px solid var(--border); background:var(--panel-2);
  font-size:12.5px; color:var(--text-dim); cursor:pointer; transition:.2s;
}
.suggest-chip:hover{ border-color:var(--gold-dim); color:var(--gold-bright); }

.msg-row{ display:flex; gap:12px; position:relative; }
.msg-row.user{ flex-direction:row-reverse; }
.avatar{
  width:32px; height:32px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:var(--panel-2); border:1px solid var(--border); overflow:hidden;
}
.avatar.ai{ background:radial-gradient(circle at 30% 30%, var(--gold-bright), var(--gold-dim)); }
.avatar svg{ width:18px; height:18px; }
.msg-col{ max-width:calc(100% - 50px); display:flex; flex-direction:column; gap:6px; }
.msg-row.user .msg-col{ align-items:flex-end; }
.bubble{
  padding:12px 15px; border-radius:16px; font-size:14.3px; line-height:1.62; background:var(--bubble-ai);
  border:1px solid var(--border); word-wrap:break-word;
}
.msg-row.user .bubble{ background:var(--bubble-user); border-color:rgba(217,179,77,.18); }
.error-placeholder{ display:flex; flex-direction:column; align-items:flex-start; }
.error-placeholder > span{ color:var(--danger); font-size:13.6px; line-height:1.5; }
.error-placeholder .btn{ font-size:12px; padding:6px 14px; }
.bubble p{ margin:0 0 .7em; }
.bubble p:last-child{ margin-bottom:0; }
.bubble ul,.bubble ol{ margin:.4em 0; padding-left:1.4em; }
.bubble blockquote{ margin:.5em 0; padding:6px 12px; border-left:3px solid var(--gold-dim); color:var(--text-dim); background:rgba(217,179,77,.05); }
.bubble hr{ border:none; border-top:1px solid var(--border); margin:1em 0; }
.bubble table{ border-collapse:collapse; margin:.6em 0; font-size:13px; width:100%; }
.bubble th,.bubble td{ border:1px solid var(--border); padding:6px 9px; text-align:left; }
.bubble th{ background:var(--panel-2); color:var(--gold-bright); }
.bubble code:not(.hljs){ background:var(--panel-2); padding:1px 6px; border-radius:5px; font-family:var(--font-mono); font-size:12.6px;}
.bubble a{ text-decoration:underline; }
.bubble.editing textarea{
  width:100%; min-height:70px; background:var(--panel-2); color:var(--text); border:1px solid var(--gold-dim);
  border-radius:10px; padding:10px; font-family:var(--font-body); font-size:14px; resize:vertical;
}

.codeblock{ position:relative; margin:.6em 0; border-radius:10px; overflow:hidden; border:1px solid var(--border); }
.codeblock-head{
  display:flex; justify-content:space-between; align-items:center; background:#161f2c; padding:6px 10px;
  font-family:var(--font-mono); font-size:11px; color:var(--text-dim); cursor:pointer;
}
.codeblock-head .cb-actions{ display:flex; gap:10px; align-items:center; }
.codeblock-head button{ background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:11px; }
.codeblock-head button:hover{ color:var(--gold-bright); }
.codeblock pre{ margin:0; max-height:420px; overflow:auto; }
.codeblock.collapsed pre{ display:none; }
.codeblock pre code{ font-family:var(--font-mono); font-size:12.6px; }

.thinking-block{
  border:1px dashed var(--gold-dim); border-radius:10px; padding:8px 12px; margin:.4em 0; background:rgba(217,179,77,.05);
  font-size:12.6px; color:var(--text-dim); font-family:var(--font-mono);
}
.thinking-block summary{ cursor:pointer; color:var(--gold); font-weight:600; }

.msg-meta{ display:flex; gap:10px; align-items:center; font-size:10.6px; color:var(--text-dim); padding:0 4px; }
.msg-actions{ display:flex; gap:4px; transition:.2s; }
/* Only hide-until-hover on devices that actually support hover with a
   precise pointer (mouse/trackpad). Touchscreens (Android, iOS, tablets)
   have no hover state, so hiding these behind :hover made them invisible
   and untappable there — they stay visible by default and only get the
   hover-reveal treatment on desktop. */
@media (hover: hover) and (pointer: fine) {
  .msg-actions{ opacity:0; }
  .msg-row:hover .msg-actions{ opacity:1; }
}
.msg-actions button{
  width:26px; height:26px; border-radius:8px; border:none; background:transparent; color:var(--text-dim);
  cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.15s;
}
.msg-actions button:hover{ background:var(--panel-2); color:var(--gold-bright); }
.msg-actions button.active{ color:var(--gold); }
.msg-actions svg{ width:14px; height:14px; }

.typing-dots{ display:flex; gap:4px; padding:4px 0; }
.typing-dots span{ width:6px; height:6px; border-radius:50%; background:var(--gold); animation:blink 1.2s infinite ease-in-out; }
.typing-dots span:nth-child(2){ animation-delay:.2s; } .typing-dots span:nth-child(3){ animation-delay:.4s; }
.typing-status{ display:flex; align-items:center; gap:9px; }
.typing-label{ font-size:12px; color:var(--text-dim); font-family:var(--font-mono); }
@keyframes blink{ 0%,80%,100%{opacity:.25; transform:scale(.85);} 40%{opacity:1; transform:scale(1);} }

.file-chip{
  display:flex; align-items:center; gap:8px; padding:8px 11px; border-radius:10px; background:var(--panel-2);
  border:1px solid var(--border); font-size:12px; color:var(--text-dim); max-width:220px;
}
.file-chip svg{ width:16px; height:16px; color:var(--gold); flex-shrink:0; }
.file-chip .fname{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ---------- Composer ---------- */
#composer-wrap{ padding:10px 18px 16px; }
#composer{
  max-width:820px; margin:0 auto; background:var(--panel); border:1px solid var(--border); border-radius:20px;
  padding:8px 10px; box-shadow:0 8px 30px rgba(0,0,0,.25);
}
html[data-theme="light"] #composer{ box-shadow:0 8px 30px rgba(20,35,55,.08); }
#attach-row{ display:flex; flex-wrap:wrap; gap:8px; padding:6px 6px 2px; }
#input-row{ display:flex; align-items:flex-end; gap:6px; }
#msg-input{
  flex:1; resize:none; border:none; outline:none; background:transparent; color:var(--text);
  font-family:var(--font-body); font-size:14.5px; line-height:1.5; max-height:180px; padding:9px 6px;
}
#msg-input::placeholder{ color:var(--text-dim); }
.composer-btn{
  width:38px; height:38px; border-radius:12px; border:none; background:var(--panel-2); color:var(--text-dim);
  display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:.2s;
}
.composer-btn:hover{ color:var(--gold-bright); }
.composer-btn.mic.recording{ color:#fff; background:var(--danger); animation:pulse 1.2s infinite; }
@keyframes pulse{ 0%,100%{box-shadow:0 0 0 0 rgba(224,85,95,.5);} 50%{box-shadow:0 0 0 8px rgba(224,85,95,0);} }
.composer-btn.send{ background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim)); color:#151008; }
.composer-btn.send:disabled{ opacity:.4; cursor:not-allowed; }
.composer-btn.stop{ background:var(--danger); color:#fff; }
#char-counter{ font-size:10.5px; color:var(--text-dim); text-align:right; padding:2px 10px 0 0; font-family:var(--font-mono); }
#continue-bar{ display:none; justify-content:center; padding-bottom:8px; }
#continue-bar button{
  padding:6px 14px; font-size:12px; border-radius:999px; border:1px solid var(--gold-dim); background:var(--panel-2);
  color:var(--gold-bright); cursor:pointer;
}

/* ---------- Popover dropdown menu ---------- */
.popover{
  position:fixed; z-index:200; min-width:220px; background:var(--panel); border:1px solid var(--border);
  border-radius:14px; box-shadow:0 16px 40px rgba(0,0,0,.4); padding:6px; display:none; max-height:70vh; overflow-y:auto;
  animation:pop-in .14s ease;
}
@keyframes pop-in{ from{opacity:0; transform:translateY(-4px) scale(.98);} to{opacity:1; transform:none;} }
.popover.show{ display:block; }
.popover-item{
  display:flex; flex-direction:column; gap:1px; padding:9px 11px; border-radius:9px; cursor:pointer; transition:.15s;
}
.popover-item:hover{ background:var(--panel-2); }
.popover-item.selected{ background:rgba(217,179,77,.12); }
.popover-item b{ font-size:12.8px; color:var(--text); display:flex; justify-content:space-between; align-items:center;}
.popover-item span{ font-size:11px; color:var(--text-dim); }
.popover-item.selected b{ color:var(--gold-bright); }
.popover-divider{ height:1px; background:var(--border); margin:5px 4px; }

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(4,8,14,.6); backdrop-filter:blur(3px); z-index:300;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.show{ display:flex; }
.modal{
  background:var(--panel); border:1px solid var(--border); border-radius:18px; width:100%; max-width:560px;
  max-height:86vh; display:flex; flex-direction:column; box-shadow:0 30px 80px rgba(0,0,0,.5);
  animation:modal-in .18s ease;
}
@keyframes modal-in{ from{opacity:0; transform:scale(.96) translateY(8px);} to{opacity:1; transform:none;} }
.modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border); }
.modal-head h3{ margin:0; font-family:var(--font-brand); font-size:14px; letter-spacing:.04em; color:var(--gold-bright); }
.modal-close{ background:none; border:none; color:var(--text-dim); cursor:pointer; width:30px; height:30px; border-radius:8px; }
.modal-close:hover{ background:var(--panel-2); color:var(--text); }
.modal-body{ padding:16px 18px; overflow-y:auto; }
.modal-foot{ padding:14px 18px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }

.tabs{ display:flex; gap:6px; flex-wrap:wrap; padding:0 18px; border-bottom:1px solid var(--border); }
.tab-btn{ padding:9px 4px; margin-bottom:-1px; background:none; border:none; color:var(--text-dim); font-size:12px; cursor:pointer; border-bottom:2px solid transparent; }
.tab-btn.active{ color:var(--gold-bright); border-bottom-color:var(--gold); }
.tab-panel{ display:none; } .tab-panel.active{ display:block; }

.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; }
.field input[type=text],.field input[type=url],.field input[type=password],.field textarea,.field select{
  width:100%; padding:9px 11px; border-radius:10px; border:1px solid var(--border); background:var(--panel-2);
  color:var(--text); font-family:var(--font-body); font-size:13px;
}
.field textarea{ min-height:80px; resize:vertical; }
.field input[type=range]{ width:100%; accent-color:var(--gold); }
.field .range-val{ font-family:var(--font-mono); color:var(--gold-bright); font-size:12px; }
.switch-row{ display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); }
.switch-row:last-child{ border-bottom:none; }
.switch-row .lbl{ font-size:13px; } .switch-row .sub{ font-size:11px; color:var(--text-dim); }
.switch{ position:relative; width:40px; height:22px; }
.switch input{ opacity:0; width:0; height:0; }
.slider-tog{ position:absolute; inset:0; background:var(--panel-2); border:1px solid var(--border); border-radius:999px; cursor:pointer; transition:.2s; }
.slider-tog:before{ content:""; position:absolute; width:16px; height:16px; left:2px; top:2px; background:var(--text-dim); border-radius:50%; transition:.2s; }
.switch input:checked + .slider-tog{ background:rgba(217,179,77,.25); border-color:var(--gold); }
.switch input:checked + .slider-tog:before{ transform:translateX(18px); background:var(--gold-bright); }

.btn{ padding:9px 16px; border-radius:10px; border:1px solid var(--border); background:var(--panel-2); color:var(--text); font-size:12.8px; cursor:pointer; transition:.2s; }
.btn:hover{ border-color:var(--gold-dim); }
.btn.primary{ background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim)); color:#151008; border:none; font-weight:600; }
.btn.danger{ background:rgba(224,85,95,.15); border-color:var(--danger); color:#ff9aa1; }
.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat-card{ background:var(--panel-2); border:1px solid var(--border); border-radius:12px; padding:12px; }
.stat-card b{ display:block; font-size:19px; color:var(--gold-bright); font-family:var(--font-mono); }
.stat-card span{ font-size:11px; color:var(--text-dim); }
.template-item{ display:flex; justify-content:space-between; align-items:center; padding:8px 10px; border-radius:9px; background:var(--panel-2); margin-bottom:6px; font-size:12.5px; }

/* ---------- Confirm popup ---------- */
.confirm-box{ text-align:center; padding:6px; }
.confirm-box .warn-ico{ width:40px; height:40px; margin:0 auto 10px; color:var(--danger); }
.confirm-box p{ font-size:13.5px; color:var(--text-dim); margin:0 0 4px; }

/* ---------- Toast ---------- */
#toast-host{ position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:500; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  background:var(--panel); border:1px solid var(--gold-dim); color:var(--text); padding:10px 16px; border-radius:12px;
  font-size:12.6px; box-shadow:0 10px 30px rgba(0,0,0,.35); animation:toast-in .2s ease; display:flex; align-items:center; gap:8px;
}
@keyframes toast-in{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

/* ---------- Sidebar mobile ---------- */
#sidebar-scrim{ position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; display:none; }

/* ---------- Modern UX polish ---------- */
:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; border-radius:6px; }
button, .composer-btn, .icon-btn, .toggle-chip, .dd-trigger, .suggest-chip, .session-item{
  transition: transform .12s ease, background .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
}
.composer-btn:active, .icon-btn:active, .new-chat-btn:active, .btn:active, .suggest-chip:active{ transform:scale(.93); }
.toggle-chip:active, .dd-trigger:active{ transform:scale(.96); }

@keyframes msg-in{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
.msg-row{ animation:msg-in .32s cubic-bezier(.2,.8,.2,1); }

/* Refined scrollbar (webkit) */
#chat-scroll::-webkit-scrollbar, #session-list::-webkit-scrollbar{ width:6px; }
#chat-scroll::-webkit-scrollbar-thumb, #session-list::-webkit-scrollbar-thumb{ background:rgba(217,179,77,.25); border-radius:8px; }
#chat-scroll::-webkit-scrollbar-thumb:hover{ background:rgba(217,179,77,.45); }

/* Source citation chips (grounded answers) */
.sources-row{ display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin:-4px 0 2px; }
.sources-label{ display:flex; align-items:center; gap:4px; font-size:10.5px; color:var(--text-dim); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.04em; margin-right:2px; }
.sources-label svg{ width:11px; height:11px; }
.source-chip{
  display:inline-flex; align-items:center; padding:5px 10px; border-radius:999px; border:1px solid var(--border);
  background:var(--panel-2); color:var(--gold-bright); font-size:11px; text-decoration:none; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; max-width:180px; transition:.2s;
}
.source-chip:hover{ border-color:var(--gold); background:rgba(217,179,77,.14); }
.source-chip .provider-badge{
  font-size:8.5px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.03em;
  opacity:.65; margin-right:5px; padding:1px 4px; border-radius:4px; background:rgba(255,255,255,.06);
}

/* Scroll-to-bottom floating action button */
#scroll-bottom-fab{
  position:absolute; right:22px; bottom:14px; width:38px; height:38px; border-radius:50%;
  background:var(--panel); border:1px solid var(--gold-dim); color:var(--gold-bright); cursor:pointer;
  display:none; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(0,0,0,.35); z-index:20;
}
#scroll-bottom-fab.show{ display:flex; animation:fab-in .18s ease; }
@keyframes fab-in{ from{ opacity:0; transform:translateY(6px) scale(.9); } to{ opacity:1; transform:none; } }
#scroll-bottom-fab:hover{ border-color:var(--gold); transform:translateY(-2px); }

/* Composer glass + focus ring for the whole input pill when textarea is focused */
#composer:focus-within{ border-color:var(--gold-dim); box-shadow:0 8px 30px rgba(0,0,0,.25), 0 0 0 3px rgba(217,179,77,.12); }

/* Sidebar glass consistency */
#sidebar{ backdrop-filter:blur(14px); background:color-mix(in srgb, var(--panel) 92%, transparent); }

.boot-loading{ display:flex; align-items:center; justify-content:center; height:60vh; }
.boot-spinner{ width:30px; height:30px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--gold); animation:boot-spin .8s linear infinite; }
@keyframes boot-spin{ to{ transform:rotate(360deg); } }

@media (max-width:800px){
  #sidebar{ position:fixed; z-index:150; top:0; bottom:0; left:0; transform:translateX(-100%); box-shadow:0 0 40px rgba(0,0,0,.4); }
  #sidebar.open{ transform:none; }
  #sidebar.open ~ #sidebar-scrim{ display:block; }
  #menu-toggle{ display:flex; }
  .dd-trigger span.dd-label-full{ display:none; }
}
@media (max-width:500px){
  .brand-text span{ display:none; }
  .topbar-controls .dd-trigger{ padding:7px 8px; }
  #chat-inner{ padding:0 10px; }
  .msg-col{ max-width:calc(100% - 42px); }
  .avatar{ width:28px; height:28px; }
  .welcome h1{ font-size:18px; }
}
@media (max-width:380px){
  .toggle-chip span.tc-label{ display:none; }
  .brand-text{ display:none; }
  #composer-wrap{ padding:8px 8px 12px; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="app">
  <!-- ============ SIDEBAR ============ -->
  <aside id="sidebar">
    <div class="brand">
      <img src="assets/logo.png" alt="SSC">
      <div class="brand-text"><b>SSC AI</b><span>UNITED BY LOGIC · DRIVEN BY SCIENCE</span></div>
    </div>
    <button class="new-chat-btn" id="new-chat-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      New Conversation
    </button>
    <div class="sidebar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="session-search" type="text" placeholder="Search chats...">
    </div>
    <div id="session-list"></div>
    <div class="sidebar-foot">
      <button class="icon-btn" id="theme-toggle" title="Toggle theme">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      </button>
      <button class="icon-btn" id="pinned-btn" title="Pinned messages">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5M9 3h6l-1 7 4 3H6l4-3-1-7z"/></svg>
      </button>
      <button class="icon-btn" id="analytics-btn" title="Analytics">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      </button>
    </div>
  </aside>
  <div id="sidebar-scrim"></div>

  <!-- ============ MAIN ============ -->
  <main id="main">
    <div id="topbar">
      <button class="icon-btn" id="menu-toggle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">New Conversation</div>
      <div class="topbar-controls" id="topbar-controls">
        <div class="dd-trigger" id="persona-trigger" data-dd="persona"><span id="persona-label">Researcher</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg></div>
        <div class="dd-trigger" id="model-trigger" data-dd="model"><span id="model-label" class="dd-label-full">Flash</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg></div>
        <div class="toggle-chip" id="websearch-toggle" title="Hybrid web search: Gemini's built-in Google Search grounding + DuckDuckGo instant answers — no extra setup">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20 15 15 0 010-20z"/></svg>
          <span class="tc-label">Search</span>
        </div>
        <div class="toggle-chip" id="deepthink-toggle" title="Deep Think">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 00-4 12.7V17a2 2 0 002 2h4a2 2 0 002-2v-2.3A7 7 0 0012 2z"/><path d="M9 21h6"/></svg>
          <span class="tc-label">Deep Think</span>
        </div>
        <div class="toggle-chip" id="mastermind-toggle" title="Mastermind mode">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg>
          <span class="tc-label">Mastermind</span>
        </div>
        <div class="status-dot off" id="status-dot" title="Backend status"></div>
      </div>
    </div>

    <div id="chat-scroll">
      <div id="chat-inner"><div class="boot-loading"><div class="boot-spinner"></div></div></div>
      <button id="scroll-bottom-fab" title="Scroll to latest">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
      </button>
    </div>

    <div id="composer-wrap">
      <div id="continue-bar"><button id="continue-btn">Response looks cut off — Continue ▸</button></div>
      <div id="composer">
        <div id="attach-row"></div>
        <div id="input-row">
          <button class="composer-btn" id="attach-btn" title="Attach file">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="composer-btn mic" id="mic-btn" title="Voice input">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
          </button>
          <textarea id="msg-input" rows="1" placeholder="Ask SSC AI anything..."></textarea>
          <button class="composer-btn send" id="send-btn" title="Send">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
      <div id="char-counter">0 chars · ~0 tokens</div>
    </div>
  </main>
</div>

<input type="file" id="file-input" multiple hidden accept=".txt,.md,.html,.csv,.json,.xml,.py,.js,.css,.cpp,.c,.java,.pdf,.docx">

<!-- Popovers, modals, toast host injected/controlled via JS -->
<div class="popover" id="popover"></div>
<div class="modal-overlay" id="settings-overlay">
  <div class="modal" id="settings-modal" style="max-width:640px;">
    <div class="modal-head"><h3>SSC AI — Settings</h3><button class="modal-close" data-close="settings-overlay">✕</button></div>
    <div class="tabs" id="settings-tabs"></div>
    <div class="modal-body" id="settings-body"></div>
    <div class="modal-foot"><button class="btn" data-close="settings-overlay">Close</button></div>
  </div>
</div>
<div class="modal-overlay" id="confirm-overlay">
  <div class="modal" style="max-width:380px;">
    <div class="modal-body confirm-box" id="confirm-body"></div>
    <div class="modal-foot" id="confirm-foot"></div>
  </div>
</div>
<div id="toast-host"></div>

<!-- ================= Vendor libraries (CDN) ================= -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.0/mammoth.browser.min.js"></script>
<script src="app.js"></script>
</body>
</html>
